<section class="about-container">
  <h1>Acerca de</h1>
  <p class="subtitle">Listado de usuarios obtenidos desde la API</p>

  @if (loading) {
    <p class="info">Cargando usuarios...</p>
  }

  @if (error) {
    <p class="error">{{ error }}</p>
  }

  @if (!loading && !error) {
    <div class="table-wrapper">
      <table class="users-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Username</th>
            <th>Email</th>
            <th>Phone</th>
          </tr>
        </thead>
        <tbody>
          @for (user of users; track user.id) {
            <tr (click)="goToDetail(user.id)" class="clickable-row">
              <td>{{ user.id }}</td>
              <td>{{ user.username }}</td>
              <td>{{ user.email }}</td>
              <td>{{ user.phone }}</td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  }
</section>
